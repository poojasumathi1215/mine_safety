<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Mine Safety</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background: #f5f5f0; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #2b2b2b; }
    .navbar-brand { color: #d97706 !important; font-weight: bold; }
    .nav-link-custom { color: #fff !important; text-decoration: none; margin-right: 15px; }
    .nav-link-custom:hover { text-decoration: underline; }
    .admin-badge { background: #d97706; color: #fff; font-size: 0.75rem; padding: 2px 10px; border-radius: 10px; margin-left: 8px; }
    .card { border: none; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
</style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container d-flex justify-content-between align-items-center">
    <span class="navbar-brand">⛑️ Intelligent Mine Worker Safety Companion</span>
    <div>
        <a href="/" class="nav-link-custom">Dashboard</a>
        <a href="/map" class="nav-link-custom">Map View</a>
        <a href="/admin" class="nav-link-custom"><u>Admin Panel</u></a>
        <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
    </div>
  </div>
</nav>

<div class="container">
    <h4 class="mb-1">Admin Panel <span class="admin-badge">Admin only — {{ user }}</span></h4>
    <p class="text-muted mb-4">Configure safety thresholds used to trigger warning/danger alerts.</p>

    {% if message %}
    <div class="alert alert-success py-2">{{ message }}</div>
    {% endif %}

    <div class="card p-4" style="max-width: 500px;">
        <form method="POST" action="/admin">
            <div class="mb-3">
                <label class="form-label">Methane Danger Level (ppm)</label>
                <input type="number" name="methane_ppm_danger" class="form-control" value="{{ thresholds.methane_ppm_danger }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Minimum Safe Oxygen (%)</label>
                <input type="number" step="0.1" name="oxygen_percent_min" class="form-control" value="{{ thresholds.oxygen_percent_min }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Maximum Safe Temperature (°C)</label>
                <input type="number" name="temperature_c_max" class="form-control" value="{{ thresholds.temperature_c_max }}" required>
            </div>
            <button type="submit" class="btn btn-warning w-100">Update Thresholds</button>
        </form>
    </div>
</div>

</body>
</html>
