<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mine Map - Worker Locations</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    body { background: #f5f5f0; font-family: 'Segoe UI', sans-serif; margin: 0; }
    .navbar { background: #2b2b2b; }
    .navbar-brand { color: #d97706 !important; font-weight: bold; }
    .nav-link-custom { color: #fff !important; text-decoration: none; margin-right: 15px; }
    .nav-link-custom:hover { text-decoration: underline; }
    #map { height: 82vh; width: 100%; }
    .controls { padding: 12px 15px; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    .legend { display: flex; gap: 20px; align-items: center; font-size: 0.9rem; }
    .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; }
</style>
</head>
<body>

<nav class="navbar navbar-dark mb-0">
  <div class="container d-flex justify-content-between align-items-center">
    <span class="navbar-brand">⛑️ Intelligent Mine Worker Safety Companion</span>
    <div>
        <a href="/" class="nav-link-custom">Dashboard</a>
        <a href="/map" class="nav-link-custom"><u>Map View</u></a>
        <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
    </div>
  </div>
</nav>

<div class="controls d-flex justify-content-between align-items-center flex-wrap gap-2">
    <span class="fw-bold">Live Worker Locations</span>
    <div class="legend">
        <span><span class="dot" style="background:#2e7d32;"></span>Safe</span>
        <span><span class="dot" style="background:#f9a825;"></span>Warning</span>
        <span><span class="dot" style="background:#c62828;"></span>Danger</span>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([23.3441, 85.3096], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(map);

    let markers = [];

    function colorFor(status) {
        if (status === 'Safe') return '#2e7d32';
        if (status === 'Warning') return '#f9a825';
        return '#c62828';
    }

    async function loadMap() {
        const res = await fetch('/workers');
        const data = await res.json();

        markers.forEach(m => map.removeLayer(m));
        markers = [];

        data.forEach(w => {
            const marker = L.circleMarker([w.lat, w.lng], {
                radius: 12,
                fillColor: colorFor(w.status),
                color: '#fff',
                weight: 2,
                fillOpacity: 0.9
            }).addTo(map);

            marker.bindPopup(`
                <b>${w.name}</b> (${w.id})<br>
                Zone: ${w.zone}<br>
                Status: <b>${w.status}</b><br>
                Methane: ${w.methane} ppm<br>
                Oxygen: ${w.oxygen}%<br>
                Temp: ${w.temperature}°C
            `);

            markers.push(marker);
        });
    }

    window.onload = loadMap;
    setInterval(loadMap, 15000);
</script>

</body>
</html>
