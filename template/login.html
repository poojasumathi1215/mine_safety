<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Mine Worker Safety Companion</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background: linear-gradient(135deg, #1c1c1c, #3a2f1b);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
        background: #fff;
        border-radius: 16px;
        padding: 40px 35px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 380px;
    }
    .login-card h2 { color: #d97706; font-weight: bold; text-align: center; margin-bottom: 5px; }
    .login-card p.sub { text-align: center; color: #888; margin-bottom: 25px; }
    .btn-login { background: #d97706; color: #fff; border: none; }
    .btn-login:hover { background: #b45f04; color: #fff; }
    .mine-emoji { text-align: center; font-size: 2.5rem; }
    .hint { font-size: 0.8rem; color: #999; text-align: center; margin-top: 15px; }
</style>
</head>
<body>

<div class="login-card">
    <div class="mine-emoji">⛑️</div>
    <h2>Mine Safety Companion</h2>
    <p class="sub">Login to monitor worker safety</p>

    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-login w-100">Login</button>
    </form>

    <p class="hint">Admin → <b>admin</b> / <b>admin123</b> &nbsp;|&nbsp; Worker → <b>worker</b> / <b>worker123</b></p>
</div>

</body>
</html>
